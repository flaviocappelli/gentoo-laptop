# by F.C.
#
# Enable touchpad tap-to-click in SDDM
# (works only if SDDM is running on Xorg).

Section "InputClass"
    Identifier "libinput touchpad catchall"
    MatchIsTouchpad "on"
    MatchDevicePath "/dev/input/event*"
    Driver "libinput"

    Option "Tapping" "on"
    #Option "NaturalScrolling" "on"
    #Option "MiddleEmulation" "on"
    Option "DisableWhileTyping" "on"
EndSection
